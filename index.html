
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Browser Video Editor</title>

<style>

:root{
--bg:#0f172a;
--card:#0b1220;
--muted:#94a3b8;
--accent:#06b6d4;
--glass:rgba(255,255,255,0.03);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,
body{
height:100%;
font-family:Inter,system-ui,Arial;
color:#e6eef6;
background:#071526;
overflow:hidden;
}

.app{
height:100vh;
display:flex;
flex-direction:column;
gap:12px;
padding:14px;
box-sizing:border-box;
}

header{
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
}

h1{
margin:0;
font-size:18px;
}

.btn{
background:#1e293b;
border:1px solid #334;
padding:8px 12px;
border-radius:10px;
color:#e6eef6;
cursor:pointer;
font-family:inherit;
}

.btn:disabled{
opacity:.5;
cursor:not-allowed;
}

.btn.ghost{
background:transparent;
border:1px dashed #334;
}

main{
flex:1;
overflow:auto;
padding:10px;
background:rgba(255,255,255,.03);
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:12px;
}

.card{
background:#0b1220;
padding:10px;
border-radius:10px;
display:flex;
flex-direction:row;
gap:12px;
border:1px solid #1a2536;
}

.video-section{
flex:1;
display:flex;
flex-direction:column;
gap:8px;
}

.controls-section{
flex:1;
display:flex;
flex-direction:column;
gap:8px;
}

.video-frame{
height:100%;
min-height:400px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border-radius:8px;
overflow:hidden;
position:relative;
}

/* MX PLAYER */

.player-container{
position:relative;
width:100%;
height:100%;
background:#000;
overflow:hidden;
touch-action:none;
border-radius:8px;
}

.player-container video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
transform-origin:center center;
transition:transform .05s linear;
}

.controls{
position:absolute;
left:0;
right:0;
bottom:0;
padding:15px;
background:linear-gradient(
transparent,
rgba(0,0,0,.8)
);
transition:.3s;
z-index:20;
}

.controls.hide{
opacity:0;
pointer-events:none;
}

.top-bar{
position:absolute;
top:0;
left:0;
right:0;
padding:15px;
background:linear-gradient(
rgba(0,0,0,.8),
transparent
);
display:flex;
justify-content:space-between;
align-items:center;
z-index:20;
transition:.3s;
}

.top-bar.hide{
opacity:0;
pointer-events:none;
}

.progress-container{
width:100%;
height:5px;
background:rgba(255,255,255,.2);
border-radius:20px;
overflow:hidden;
margin-bottom:12px;
cursor:pointer;
}

.progress{
width:0%;
height:100%;
background:#00bcd4;
}

.buttons{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
}

.left-controls,
.right-controls{
display:flex;
align-items:center;
gap:10px;
}

.player-container button,
.player-container select,
.player-container input{
background:black;
border:none;
color:white;
font-size:14px;
}

.player-container button{
cursor:pointer;
padding:6px 10px;
border-radius:6px;
}

.player-container button:hover{
background:rgba(255,255,255,.15);
}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
background:rgba(0,0,0,.6);
padding:14px 22px;
border-radius:14px;
font-size:22px;
z-index:100;
opacity:0;
transition:.25s;
pointer-events:none;
}

.overlay.show{
opacity:1;
}

.brightness-layer{
position:absolute;
inset:0;
background:black;
opacity:0;
pointer-events:none;
z-index:5;
}

.thumbnail-preview{
position:absolute;
bottom:130px;
left:50%;
transform:translateX(-50%);
width:240px;
background:rgba(15,15,15,.95);
border-radius:18px;
overflow:hidden;
z-index:999;
display:none;
backdrop-filter:blur(20px);
box-shadow:
0 10px 30px rgba(0,0,0,.6);
border:1px solid rgba(255,255,255,.08);
}

.thumbnail-preview canvas{
width:100%;
height:135px;
display:block;
background:black;
}

.preview-time{
color:white;
text-align:center;
padding:8px;
font-size:14px;
}

.speed-indicator{
position:absolute;
top:50%;
right:20px;
transform:translateY(-50%);
color:white;
background:rgba(0,0,0,.6);
padding:10px;
border-radius:10px;
display:none;
z-index:50;
}

.gesture-indicator{
position:absolute;
top:50%;
transform:translateY(-50%);
width:70px;
background:rgba(0,0,0,.7);
border-radius:16px;
padding:14px 10px;
z-index:120;
display:none;
color:white;
text-align:center;
backdrop-filter:blur(10px);
}

.left-indicator{
left:20px;
}

.right-indicator{
right:20px;
}

.gesture-title{
font-size:12px;
margin-bottom:10px;
}

.gesture-bar{
width:8px;
height:120px;
background:rgba(255,255,255,.15);
border-radius:20px;
margin:auto;
overflow:hidden;
position:relative;
}

.gesture-fill{
position:absolute;
bottom:0;
width:100%;
height:50%;
background:#00bcd4;
border-radius:20px;
transition:height .08s linear;
}

.gesture-value{
margin-top:10px;
font-size:13px;
}

/* EDITOR */

.meta{
display:flex;
justify-content:space-between;
font-size:13px;
color:#94a3b8;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.small{
font-size:13px;
padding:4px 7px;
}

.timestampBar{
font-size:12px;
color:#cde1ff;
display:flex;
justify-content:space-between;
}

.inrow{
display:flex;
gap:6px;
align-items:center;
flex-wrap:wrap;
}

.inrow input{
width:85px;
padding:4px;
border-radius:6px;
border:1px solid #334;
background:#112;
color:#eef;
font-size:12px;
}

.inrow input.editing{
background:#1a2536;
border-color:#06b6d4;
}

.clips-list{
background:#111;
padding:6px;
border-radius:6px;
font-size:13px;
max-height:110px;
overflow:auto;
}

.clip-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px;
margin:4px 0;
background:#1a2536;
border-radius:4px;
gap:6px;
flex-wrap:wrap;
}

.clip-item.editing{
background:#0f4a5a;
border:1px solid #06b6d4;
}

.clip-text{
flex:1;
min-width:150px;
}

.clip-actions{
display:flex;
gap:4px;
flex-wrap:wrap;
}

#progressContainer{
width:100%;
height:6px;
background:#1e293b;
border-radius:4px;
overflow:hidden;
display:none;
}

#progressBar{
height:100%;
width:0%;
background:#06b6d4;
transition:width .25s;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
z-index:1000;
align-items:center;
justify-content:center;
}

.modal-content{
background:#0b1220;
padding:20px;
border-radius:10px;
border:1px solid #334;
max-width:400px;
width:90%;
}

.modal-content h3{
margin-top:0;
}

.modal-actions{
display:flex;
gap:10px;
margin-top:15px;
justify-content:flex-end;
}

.notice{
background:#334;
padding:8px 12px;
border-radius:6px;
font-size:12px;
color:#ffd700;
margin-top:8px;
}

.time-text{
color:white;
}

/* MOBILE */

@media (max-width:768px){

.app{
padding:8px;
gap:8px;
}

header{
flex-direction:column;
align-items:stretch;
}

h1{
font-size:16px;
text-align:center;
}

.grid{
gap:8px;
}

.card{
flex-direction:column;
padding:8px;
gap:8px;
}

.video-section{
width:100%;
}

.controls-section{
width:100%;
}

.video-frame{
min-height:220px;
height:auto;
}

.actions{
justify-content:center;
}

.clip-actions{
justify-content:center;
flex-wrap:wrap;
}

.inrow{
justify-content:center;
}

.btn{
font-size:13px;
padding:6px 10px;
}

.small{
font-size:12px;
padding:3px 6px;
}

.notice{
font-size:11px;
padding:6px 8px;
}

main{
padding:8px;
}

footer{
flex-direction:column;
gap:6px;
font-size:12px;
}

.thumbnail-preview{
width:180px;
bottom:100px;
}

.thumbnail-preview canvas{
height:100px;
}

}

</style>
</head>
<body>

<div class="app">

<header>
  <h1>Browser Video Editor</h1>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <label for="files" class="btn">Select Videos</label>
    <input id="files" type="file" multiple accept="video/*" style="display:none">
    <button id="exportBtn" class="btn">Export All (Merge)</button>
    <button id="downloadAllBtn" class="btn">Download All Clips</button>
    <button id="clearBtn" class="btn ghost">Clear All</button>
  </div>
</header>

<div id="progressContainer"><div id="progressBar"></div></div>

<main><div id="grid" class="grid"></div></main>

<footer style="display:flex;gap:10px;flex-wrap:wrap">
  <div id="status" style="font-size:13px;color:#94a3b8">No videos loaded.</div>
  <div style="margin-left:auto;font-size:13px;color:#94a3b8" id="ffmpegStatus">FFmpeg: Not loaded</div>
</footer>

</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>Edit Clip</h3>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="inrow">
        <label>Start:</label>
        <input id="editStart" placeholder="0:00.000">
      </div>
      <div class="inrow">
        <label>End:</label>
        <input id="editEnd" placeholder="0:00.000">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="cancelEdit">Cancel</button>
      <button class="btn" id="saveEdit">Save</button>
    </div>
  </div>
</div>

<script>
const filesInput=document.getElementById("files");
const grid=document.getElementById("grid");
const status=document.getElementById("status");
const exportBtn=document.getElementById("exportBtn");
const downloadAllBtn=document.getElementById("downloadAllBtn");
const clearBtn=document.getElementById("clearBtn");
const ffmpegStatus=document.getElementById("ffmpegStatus");
const editModal=document.getElementById("editModal");
const editStart=document.getElementById("editStart");
const editEnd=document.getElementById("editEnd");
const saveEdit=document.getElementById("saveEdit");
const cancelEdit=document.getElementById("cancelEdit");

let videos=[];
let playingId=null;
let editingClip=null;

filesInput.addEventListener("change",async e=>{
  const list=[...e.target.files];
  if(!list.length) return;
  status.textContent="Loading...";
  for(const f of list){
    const id=crypto.randomUUID();
    const url=URL.createObjectURL(f);
    const item={id,file:f,url,title:f.name,size:f.size,duration:0,clips:[],tmpStart:null,tmpEnd:null};
    videos.push(item);
    addCard(item);
    await loadMetadata(item);
  }
  status.textContent=`Loaded ${videos.length} video(s).`;
  filesInput.value='';
});

function addCard(item){
  const card=document.createElement("div");
  card.className="card";
  card.id="card-"+item.id;

  card.innerHTML=`

<div class="video-section">

  <div class="video-frame">

    <div class="player-container" id="player-${item.id}">

      <!-- VIDEO -->
      <video
        id="video-${item.id}"
        src="${item.url}"
        playsinline
        preload="auto"
        crossorigin="anonymous">
      </video>

      <!-- BRIGHTNESS -->
      <div
        class="brightness-layer"
        id="brightnessLayer-${item.id}">
      </div>

      <!-- CENTER OVERLAY -->
      <div
        class="overlay"
        id="overlay-${item.id}">
      </div>

      <!-- THUMBNAIL PREVIEW -->
      <div
        class="thumbnail-preview"
        id="thumbnailPreview-${item.id}">

        <canvas id="previewCanvas-${item.id}"></canvas>

        <div
          class="preview-time"
          id="previewTime-${item.id}">
          00:00
        </div>

      </div>

      <!-- BRIGHTNESS INDICATOR -->
      <div
        class="gesture-indicator left-indicator"
        id="brightnessIndicator-${item.id}">

        <div class="gesture-title">
          Brightness
        </div>

        <div class="gesture-bar">
          <div
            class="gesture-fill"
            id="brightnessFill-${item.id}">
          </div>
        </div>

        <div
          class="gesture-value"
          id="brightnessValue-${item.id}">
          100%
        </div>

      </div>

      <!-- VOLUME INDICATOR -->
      <div
        class="gesture-indicator right-indicator"
        id="volumeIndicator-${item.id}">

        <div class="gesture-title">
          Volume
        </div>

        <div class="gesture-bar">
          <div
            class="gesture-fill"
            id="volumeFill-${item.id}">
          </div>
        </div>

        <div
          class="gesture-value"
          id="volumeValue-${item.id}">
          100%
        </div>

      </div>

      <!-- SPEED INDICATOR -->
      <div
        class="speed-indicator"
        id="speedIndicator-${item.id}">
        2x
      </div>

      <!-- TOP BAR -->
      <div
        class="top-bar"
        id="topBar-${item.id}">

        <div>
          ${item.title}
        </div>

      </div>

      <!-- CONTROLS -->
      <div
        class="controls"
        id="controls-${item.id}">

        <!-- PROGRESS -->
        <div
          class="progress-container"
          id="mxProgressContainer-${item.id}">

          <div
            class="progress"
            id="mxProgress-${item.id}">
          </div>

        </div>

        <!-- BUTTONS -->
        <div class="buttons">

          <div class="left-controls">

            <button id="playBtn-${item.id}">
              ▶
            </button>

            <span
              class="time-text"
              id="timeText-${item.id}">
              00:00 / 00:00
            </span>

          </div>

          <div class="right-controls">

            <select id="speedSelect-${item.id}">
              <option>0.5</option>
              <option selected>1</option>
              <option>1.5</option>
              <option>2</option>
            </select>

            <button id="pipBtn-${item.id}">
              PiP
            </button>

            <button id="fullscreenBtn-${item.id}">
              ⛶
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<!-- RIGHT SIDE -->
<div class="controls-section">

  <div class="meta">

    <strong>${item.title}</strong>

    <span id="meta-${item.id}">
      --
    </span>

  </div>

  <div class="timestampBar">

    <span id="ctime-${item.id}">
      00:00.000
    </span>

    <span id="aduration-${item.id}">
    </span>

  </div>

  <div class="inrow">

    Start:

    <input
      id="start-${item.id}"
      placeholder="0:00.000">

    End:

    <input
      id="end-${item.id}"
      placeholder="0:00.000">

    <button
      class="small btn"
      data-action="apply"
      data-id="${item.id}">

      Add Clip

    </button>

  </div>

  <div class="actions">

    <button
      class="small btn"
      data-action="play"
      data-id="${item.id}">

      Play

    </button>

    <button
      class="small btn"
      data-action="pause"
      data-id="${item.id}">

      Pause

    </button>

    <button
      class="small btn"
      data-action="setStart"
      data-id="${item.id}">

      Set Start

    </button>

    <button
      class="small btn"
      data-action="setEnd"
      data-id="${item.id}">

      Set End

    </button>

    <button
      class="small btn"
      data-action="remove"
      data-id="${item.id}">

      Remove Video

    </button>

  </div>

  <div
    class="clips-list"
    id="clips-${item.id}">

    No clips.

  </div>

  <div class="notice">

    💡 Tip: "Download" saves individual clips.
    "Export All" merges all clips into one video.

  </div>

</div>

`;

  grid.appendChild(card);
initMXPlayer(item.id);
  const vid=document.getElementById("video-"+item.id);
  vid.addEventListener("play",()=>{pauseAllExcept(item.id);playingId=item.id});
  vid.addEventListener("pause",()=>{if(playingId===item.id) playingId=null});

  vid.addEventListener("timeupdate",()=>{ document.getElementById("ctime-"+item.id).textContent=formatMS(vid.currentTime); });

  card.addEventListener("click",e=>{
    const btn=e.target.closest("button");
    if(!btn) return;
    const id=btn.dataset.id;
    const act=btn.dataset.action;
    const v=videos.find(x=>x.id===id);
    if(v) handleAction(act,v);
  });
}

function pauseAllExcept(id){
  videos.forEach(v=>{
    if(v.id!==id){
      let x=document.getElementById("video-"+v.id);
      if(x && !x.paused) x.pause();
    }
  });
}

let activePlayerId = null;

function initMXPlayer(id){

const video =
document.getElementById("video-"+id);

const player =
document.getElementById("player-"+id);

const controls =
document.getElementById("controls-"+id);

const topBar =
document.getElementById("topBar-"+id);

const playBtn =
document.getElementById("playBtn-"+id);

const progress =
document.getElementById("mxProgress-"+id);

const progressContainer =
document.getElementById("mxProgressContainer-"+id);

const timeText =
document.getElementById("timeText-"+id);

const overlay =
document.getElementById("overlay-"+id);

const fullscreenBtn =
document.getElementById("fullscreenBtn-"+id);

const pipBtn =
document.getElementById("pipBtn-"+id);

const speedSelect =
document.getElementById("speedSelect-"+id);

const brightnessLayer =
document.getElementById("brightnessLayer-"+id);

const brightnessIndicator =
document.getElementById("brightnessIndicator-"+id);

const volumeIndicator =
document.getElementById("volumeIndicator-"+id);

const brightnessFill =
document.getElementById("brightnessFill-"+id);

const volumeFill =
document.getElementById("volumeFill-"+id);

const brightnessValue =
document.getElementById("brightnessValue-"+id);

const volumeValue =
document.getElementById("volumeValue-"+id);

const thumbnailPreview =
document.getElementById("thumbnailPreview-"+id);

const previewCanvas =
document.getElementById("previewCanvas-"+id);

const previewTime =
document.getElementById("previewTime-"+id);

const speedIndicator =
document.getElementById("speedIndicator-"+id);

const ctx =
previewCanvas.getContext("2d");

const previewVideo =
document.createElement("video");

previewVideo.muted = true;
previewVideo.playsInline = true;
previewVideo.preload = "auto";
previewVideo.src = video.src;

volumeFill.style.height = "100%";
volumeValue.innerHTML = "100%";

brightnessFill.style.height = "100%";
brightnessValue.innerHTML = "100%";

let controlsTimeout;

let brightness = 1;

let startX = 0;
let startY = 0;

let startTime = 0;

let startVolume = 1;

let startBrightness = 1;

let gestureMode = "";

let lastTap = 0;

let previewBusy = false;

function showOverlay(text){

overlay.innerHTML = text;

overlay.classList.add("show");

clearTimeout(overlay.timer);

overlay.timer = setTimeout(()=>{

overlay.classList.remove("show");

},700);

}

function formatTime(sec){

sec = Math.floor(sec);

let m = Math.floor(sec / 60);

let s = sec % 60;

return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;

}

playBtn.onclick = ()=>{

if(video.paused){

pauseAllExcept(id);

video.play().catch(()=>{});

}else{

video.pause();

}

};

video.addEventListener("play",()=>{

playBtn.innerHTML = "❚❚";

});

video.addEventListener("pause",()=>{

playBtn.innerHTML = "▶";

});

video.addEventListener("timeupdate",()=>{

if(video.duration){

const percent =
(video.currentTime / video.duration) * 100;

progress.style.width =
percent + "%";

timeText.innerHTML =
`${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;

}

});

progressContainer.addEventListener("click",e=>{

const rect =
progressContainer.getBoundingClientRect();

const x =
e.clientX - rect.left;

const percent =
x / rect.width;

video.currentTime =
percent * video.duration;

});

fullscreenBtn.onclick = ()=>{

if(!document.fullscreenElement){

player.requestFullscreen();

}else{

document.exitFullscreen();

}

};

pipBtn.onclick = async ()=>{

if(document.pictureInPictureEnabled){

await video.requestPictureInPicture();

}

};

speedSelect.onchange = ()=>{

video.playbackRate =
speedSelect.value;

};

function showControls(){

controls.classList.remove("hide");

topBar.classList.remove("hide");

clearTimeout(controlsTimeout);

controlsTimeout = setTimeout(()=>{

controls.classList.add("hide");

topBar.classList.add("hide");

},3000);

}

showControls();

player.addEventListener("mousemove",showControls);

player.addEventListener("touchstart",showControls);

function drawPreviewFrame(time){

if(
!previewVideo.src ||
!isFinite(time) ||
isNaN(time)
){
return;
}

if(previewBusy) return;

previewBusy = true;

previewVideo.currentTime = time;

}

previewVideo.addEventListener("seeked",()=>{

previewCanvas.width = 320;

previewCanvas.height = 180;

ctx.drawImage(
previewVideo,
0,
0,
previewCanvas.width,
previewCanvas.height
);

previewBusy = false;

});

function showKeyboardThumbnail(time){

thumbnailPreview.style.display = "block";

previewTime.innerHTML =
formatTime(time);

drawPreviewFrame(time);

clearTimeout(showKeyboardThumbnail.timer);

showKeyboardThumbnail.timer = setTimeout(()=>{

thumbnailPreview.style.display = "none";

},800);

}

player.addEventListener("mouseenter",()=>{

activePlayerId = id;

});

player.addEventListener("click",()=>{

activePlayerId = id;

});

function handleAction(a,target){
  const vid=document.getElementById("video-"+target.id);
  const startInput=document.getElementById("start-"+target.id);
  const endInput=document.getElementById("end-"+target.id);

  if(a==="play") vid.play();
  if(a==="pause") vid.pause();

  if(a==="setStart"){
    target.tmpStart=vid.currentTime;
    startInput.value=formatMS(vid.currentTime);
  }
  if(a==="setEnd"){
    if(target.tmpStart==null){alert("Set Start first");return;}
    if(vid.currentTime<=target.tmpStart){alert("End must be > Start");return;}
    target.tmpEnd=vid.currentTime;
    endInput.value=formatMS(vid.currentTime);
  }
  if(a==="apply"){
    const s=startInput.value.trim();
    const e=endInput.value.trim();
    if(!s || !e){alert("Please set both Start and End timestamps");return;}
    const ts=parseTS(s), te=parseTS(e);
    if(ts==null||te==null||te<=ts){alert("Invalid timestamps");return;}
    target.clips.push({start:ts,end:te});
    startInput.value='';
    endInput.value='';
    target.tmpStart=null;
    target.tmpEnd=null;
    renderClips(target);
  }
  if(a==="remove"){
    videos=videos.filter(v=>v.id!==target.id);
    const node=document.getElementById("card-"+target.id);
    if(node) node.remove();
    URL.revokeObjectURL(target.url);
    status.textContent=`${videos.length} video(s) loaded.`;
  }
}

  t.clips.forEach((c,i)=>{
    const duration=c.end-c.start;
    const d=document.createElement("div");
    d.className="clip-item";
    d.id=`clip-item-${t.id}-${i}`;
    d.innerHTML=`
      <div class="clip-text">Clip ${i+1}: ${formatMS(c.start)} → ${formatMS(c.end)} (${formatMS(duration)})</div>

function formatBytes(b){return (b/1024/1024).toFixed(2)+" MB";}
function pad(n){return String(n).padStart(2,"0");}

function formatTime(t){
  const m=Math.floor(t/60),s=Math.floor(t%60);
  return pad(m)+":"+pad(s);
}

function formatMS(t){
  const m=Math.floor(t/60),s=Math.floor(t%60);
  const ms=Math.floor((t-Math.floor(t))*1000);
  return `${pad(m)}:${pad(s)}.${String(ms).padStart(3,'0')}`;
}

function parseTS(str){
  const m=str.match(/^(\d+):(\d+)\.(\d+)$/);
  if(!m) return null;
  return (+m[1])*60 + (+m[2]) + (+m[3])/1000;
}

function showProgress(p){
  document.getElementById("progressContainer").style.display="block";
  updateProgress(p);
}
function updateProgress(p){
  document.getElementById("progressBar").style.width=Math.min(100,p)+"%";
}

function formatElapsed(ms){
  const sec = Math.max(0, ms / 1000);

  if(sec < 60){
    return `${sec.toFixed(1)}s`;
  }

  const min = Math.floor(sec / 60);
  const rem = Math.floor(sec % 60);

  return `${min}m ${rem}s`;
}

          // remove audio track for this clip if we added it
          if(audioTrack){
            try { stream.removeTrack(audioTrack); } catch(e){ /* ignore */ }
          }
          // small pause to ensure last frames flush into recorder
          setTimeout(()=>resolveFrame(), 50);
        };

        if ('requestVideoFrameCallback' in HTMLVideoElement.prototype ) {
          const onFrame = (now, metadata) => {
            // draw the frame
            drawAspectFit(videoEl);

            // progress update (scaled between 20 and 95)
            const clipProgress = (i + ((videoEl.currentTime - c.start)/duration)) / clipsWithDetails.length;
            const prog = 20 + clipProgress * 75;
            updateProgress(prog);

            if (videoEl.currentTime + 0.03 >= c.end || videoEl.ended) {
              // reached clip end
              videoEl.pause();
              cleanupAndResolve();
              return;
            }
            videoEl.requestVideoFrameCallback(onFrame);
          };
          videoEl.requestVideoFrameCallback(onFrame);
        } else {
          // fallback: draw at ~30fps
          const fps=30;
          const interval = 1000 / fps;
          const timer = setInterval(()=>{
            drawAspectFit(videoEl);
            const clipProgress = (i + ((videoEl.currentTime - c.start)/duration)) / clipsWithDetails.length;
            const prog = 20 + clipProgress * 75;
            updateProgress(prog);

            if (videoEl.currentTime + 0.03 >= c.end || videoEl.ended) {
              clearInterval(timer);
              videoEl.pause();
              cleanupAndResolve();
            }
          }, interval);
        }
      });

      await framePromise;

      // ensure small gap to let audio track finish
      await new Promise(r=>setTimeout(r,80));
      videoEl.muted=false;
      await new Promise(r=>setTimeout(r,120));
    }

    // finalize
    showProgress(98);
    status.textContent="Finalizing video...";
    recorder.stop();

  } catch(err) {
    console.error("Export error:",err);
    alert("Export error: "+err.message);
    status.textContent="Export failed.";
    document.getElementById("progressContainer").style.display="none";
    exportBtn.disabled=false;
    exportBtn.textContent="Export All (Merge)";
  }
});

function formatSRT(seconds){
  const h=Math.floor(seconds/3600);
  const m=Math.floor((seconds%3600)/60);
  const s=Math.floor(seconds%60);
  const ms=Math.floor((seconds%1)*1000);
  return `${pad(h)}:${pad(m)}:${pad(s)},${String(ms).padStart(3,'0')}`;
}

function collectClips(){
  const all=[];
  for(const v of videos){
    for(const c of v.clips)
      all.push({videoId:v.id,start:c.start,end:c.end});
  }
  return all;
}

function collectClipsWithDetails(){
  const all=[];
  for(const v of videos){
    for(let i=0;i<v.clips.length;i++){
      const c=v.clips[i];
      all.push({
        videoId:v.id,
        start:c.start,
        end:c.end,
        videoTitle:v.title,
        clipIndex:i
      });
    }
  }
  return all;
}

downloadAllBtn.addEventListener("click",async()=>{
  const clipsWithDetails=collectClipsWithDetails();
  if(!clipsWithDetails.length){alert("No clips to download");return;}

  downloadAllBtn.disabled=true;
  downloadAllBtn.textContent="Downloading...";
  showProgress(0);

  try {
    for(let i=0;i<clipsWithDetails.length;i++){
      const c=clipsWithDetails[i];
      const v=videos.find(x=>x.id===c.videoId);
      
      status.textContent=`Downloading clip ${i+1}/${clipsWithDetails.length}...`;
      updateProgress((i/clipsWithDetails.length)*100);
      
      await downloadSingleClip(v,c.clipIndex,c.start,c.end);
      
      // Wait between downloads
      await new Promise(r=>setTimeout(r,500));
    }

    updateProgress(100);
    setTimeout(()=>{ document.getElementById("progressContainer").style.display="none"; },1000);
    status.textContent=`All ${clipsWithDetails.length} clips downloaded successfully!`;
    downloadAllBtn.disabled=false;
    downloadAllBtn.textContent="Download All Clips";
  } catch(err) {
    console.error("Download all error:",err);
    alert("Error downloading clips: "+err.message);
    status.textContent="Download failed.";
    document.getElementById("progressContainer").style.display="none";
    downloadAllBtn.disabled=false;
    downloadAllBtn.textContent="Download All Clips";
  }
});

async function downloadSingleClip(v,clipIndex,start,end){
  return new Promise(async(resolve,reject)=>{
    try {
      const downloadStartTime = performance.now();
      // Create a hidden video element for recording
      const videoEl=document.createElement('video');
      videoEl.src=v.url;
      videoEl.muted=true;
      videoEl.style.display='none';
      document.body.appendChild(videoEl);
      
      await new Promise(res=>videoEl.onloadedmetadata=res);
      
      // Create canvas for capture
      const canvas=document.createElement('canvas');
      canvas.width=videoEl.videoWidth;
      canvas.height=videoEl.videoHeight;
      const ctx=canvas.getContext('2d');
      
      // Create MediaStream from canvas
      const stream=canvas.captureStream(30);
      
      // Add audio track if available
      if(videoEl.captureStream){
        const videoStream=videoEl.captureStream();
        const audioTracks=videoStream.getAudioTracks();
        if(audioTracks.length>0){
          stream.addTrack(audioTracks[0]);
        }
      }
      
      const recorder=new MediaRecorder(stream,{
        mimeType:'video/webm;codecs=vp9',
        videoBitsPerSecond:2500000
      });
      
      const chunks=[];
      recorder.ondataavailable=e=>chunks.push(e.data);
      
      recorder.onstop=()=>{
        const blob=new Blob(chunks,{type:'video/webm'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;
        a.download=`${v.title.replace(/\.[^/.]+$/,"")}_clip${clipIndex+1}.webm`;
        a.click();
        URL.revokeObjectURL(url);
        if(videoEl && videoEl.parentNode) document.body.removeChild(videoEl);
        const elapsed = performance.now() - downloadStartTime;

status.textContent =
  `Clip ${clipIndex+1} downloaded in ${formatElapsed(elapsed)}`;
        resolve();
      };
      
      // Start recording
      recorder.start();
      videoEl.currentTime=start;
      await waitForSeek(videoEl);
      await videoEl.play();
      
      const duration=end-start;
      const startTime=Date.now();
      
      // Use requestVideoFrameCallback when available for accurate frames
      if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
        const onFrame = () => {
          ctx.drawImage(videoEl,0,0,canvas.width,canvas.height);
          if(videoEl.currentTime>=end || Date.now()-startTime>=duration*1000+500){
            recorder.stop();
            videoEl.pause();
            return;
          }
          videoEl.requestVideoFrameCallback(onFrame);
        };
        videoEl.requestVideoFrameCallback(onFrame);
      } else {
        const fps = 30;
        const interval = 1000 / fps;
        const timer = setInterval(()=>{
          if(videoEl.currentTime>=end || Date.now()-startTime>=duration*1000+500){
            clearInterval(timer);
            recorder.stop();
            videoEl.pause();
            return;
          }
          ctx.drawImage(videoEl,0,0,canvas.width,canvas.height);
        }, interval);
      }
      
    } catch(err) {
      reject(err);
    }
  });
}

clearBtn.addEventListener("click",()=>{
  if(!videos.length) return;
  if(!confirm("Clear all videos and clips?")) return;
  videos.forEach(v=>{
    const vid=document.getElementById("video-"+v.id);
    if(vid) vid.pause();
    URL.revokeObjectURL(v.url);
  });
  videos=[];
  grid.innerHTML="";
  status.textContent="Cleared all videos.";
  document.getElementById("progressContainer").style.display="none";
});


// helper: wait for seeking to finish
function waitForSeek(videoEl, timeout=3000){
  return new Promise((resolve, reject) => {
    const onSeeked = () => {
      cleanup();
      resolve();
    };
    const onError = () => {
      cleanup();
      resolve(); // still resolve; we'll try playing
    };
    const cleanup = () => {
      videoEl.removeEventListener('seeked', onSeeked);
      videoEl.removeEventListener('error', onError);
    };
    videoEl.addEventListener('seeked', onSeeked);
    videoEl.addEventListener('error', onError);
    // fallback timeout
    setTimeout(()=>{ cleanup(); resolve(); }, timeout);
  });
}
